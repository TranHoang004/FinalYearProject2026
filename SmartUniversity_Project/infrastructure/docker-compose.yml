version: '3.8'

services:
  # 1. SERVER CƠ SỞ DỮ LIỆU (SQL Server)
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: uni_sqlserver
    user: root  # Tránh lỗi Access Denied khi map volume
    hostname: sqlserver
    restart: always  # <--- TÍNH NĂNG MỚI: Tự động khởi động cùng máy tính
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPass123!
    ports:
      - "14330:1433"  
    volumes:
      - sqldata:/var/opt/mssql/data
    networks:
      - uni-net

networks:
  uni-net:
    driver: bridge

volumes:
  sqldata: